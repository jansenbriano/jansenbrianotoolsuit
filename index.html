<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jansen's Tool Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d0f12;
    --bg-2:#13161b;
    --bg-3:#1a1e26;
    --border:#262b34;
    --text:#e7e9ee;
    --text-dim:#94a3b8;
    --accent:#fbbf24;
    --accent-2:#f59e0b;
    --nav-h:60px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    font-family:'IBM Plex Sans',system-ui,sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }

  /* ===== Navbar ===== */
  .nav{
    height:var(--nav-h);
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 18px;
    background:var(--bg-2);
    border-bottom:1px solid var(--border);
    position:relative;
    z-index:50;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    font-weight:600;
    font-size:16px;
    letter-spacing:.3px;
    white-space:nowrap;
  }
  .brand .dot{
    width:11px;height:11px;border-radius:3px;
    background:var(--accent);
    box-shadow:0 0 12px rgba(251,191,36,.6);
  }
  .brand small{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--text-dim);
    font-weight:400;
  }

  .links{
    display:flex;
    align-items:center;
    gap:4px;
  }
  .links a{
    font-family:'IBM Plex Mono',monospace;
    font-size:13px;
    color:var(--text-dim);
    text-decoration:none;
    padding:9px 14px;
    border-radius:8px;
    border:1px solid transparent;
    transition:all .15s ease;
    white-space:nowrap;
  }
  .links a:hover{
    color:var(--text);
    background:var(--bg-3);
  }
  .links a.active{
    color:var(--accent);
    background:var(--bg-3);
    border-color:var(--border);
  }

  /* hamburger */
  .burger{
    display:none;
    flex-direction:column;
    gap:5px;
    background:none;border:none;cursor:pointer;
    padding:8px;border-radius:8px;
  }
  .burger:hover{background:var(--bg-3);}
  .burger span{
    width:22px;height:2px;background:var(--text);
    border-radius:2px;transition:.25s;
  }
  .burger.open span:nth-child(1){transform:translateY(7px) rotate(45deg);}
  .burger.open span:nth-child(2){opacity:0;}
  .burger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}

  /* ===== Frame area ===== */
  .frame-wrap{
    flex:1 1 auto;
    position:relative;
    min-height:0;
  }
  iframe{
    border:0;
    width:100%;
    height:100%;
    display:none;
    background:var(--bg);
  }
  iframe.active{display:block;}

  /* ===== Mobile ===== */
  @media (max-width:900px){
    .burger{display:flex;}
    .brand small{display:none;}
    .links{
      position:absolute;
      top:var(--nav-h);
      left:0;right:0;
      flex-direction:column;
      align-items:stretch;
      gap:0;
      background:var(--bg-2);
      border-bottom:1px solid var(--border);
      padding:8px;
      transform:translateY(-12px);
      opacity:0;
      pointer-events:none;
      transition:.2s ease;
      box-shadow:0 16px 30px rgba(0,0,0,.5);
    }
    .links.open{
      transform:translateY(0);
      opacity:1;
      pointer-events:auto;
    }
    .links a{
      font-size:15px;
      padding:14px 16px;
      border-radius:8px;
    }
    .links a.active{border-color:transparent;}
  }
</style>
</head>
<body>
  <nav class="nav">
    <div class="brand">
      <span class="dot"></span>
      Jansen's Tool Suite
    </div>
    <div class="links" id="links">
      <a href="#converter" data-app="converter">Fleet Card Converter</a>
      <a href="#do" data-app="do">DO Extractor</a>
      <a href="#extractor" data-app="extractor">Data → Table</a>
      <a href="#rincianharian" data-app="rincianharian">Rincian Harian</a>
    </div>
    <button class="burger" id="burger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <div class="frame-wrap" id="frameWrap"></div>

<script>
  const APPS = {
    converter:     { file:'converter.html' },
    do:            { file:'do.html' },
    extractor:     { file:'extractor.html' },
    rincianharian: { file:'rincianharian.html' }
  };
  const ORDER = ['converter','do','extractor','rincianharian'];

  const frameWrap = document.getElementById('frameWrap');
  const links = document.getElementById('links');
  const burger = document.getElementById('burger');
  const loaded = {};

  function ensureFrame(name){
    if(loaded[name]) return loaded[name];
    const f = document.createElement('iframe');
    f.src = APPS[name].file;
    f.id = 'frame-' + name;
    f.title = name;
    frameWrap.appendChild(f);
    loaded[name] = f;
    return f;
  }

  function show(name){
    if(!APPS[name]) name = ORDER[0];
    // frames
    ensureFrame(name);
    Object.keys(loaded).forEach(k=>{
      loaded[k].classList.toggle('active', k===name);
    });
    // links
    links.querySelectorAll('a').forEach(a=>{
      a.classList.toggle('active', a.dataset.app===name);
    });
    // close mobile menu
    links.classList.remove('open');
    burger.classList.remove('open');
    if(location.hash !== '#'+name) history.replaceState(null,'','#'+name);
  }

  function current(){
    return (location.hash || '').replace('#','') || ORDER[0];
  }

  burger.addEventListener('click', ()=>{
    links.classList.toggle('open');
    burger.classList.toggle('open');
  });

  window.addEventListener('hashchange', ()=> show(current()));
  show(current());
</script>
</body>
</html>
